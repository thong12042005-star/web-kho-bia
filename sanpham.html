<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
    function initFilters() {
        const itemsPerPage = 10;
        const allProducts = Array.from(document.querySelectorAll('.product'));
        let filteredProducts = [...allProducts];
        const pageLinks = document.querySelectorAll('.page-link[data-page]');
        const prevLink = document.querySelector('.page-link[data-action="prev"]');
        const nextLink = document.querySelector('.page-link[data-action="next"]');
        const paginationContainer = document.getElementById('pagination');
        let currentPage = 1;

        const categoryButtons = document.querySelectorAll('.category button');

        const sortOptionItems = document.querySelectorAll('.sort-options li');
        const sortSelectedText = document.querySelector('.sort-selected strong');
        let currentSort = 'Tất cả';

        function applySort() {
            if (currentSort === 'Tên từ A-Z') {
                filteredProducts.sort((a, b) => {
                    const titleA = a.querySelector('h3').textContent.trim();
                    const titleB = b.querySelector('h3').textContent.trim();
                    return titleA.localeCompare(titleB, 'vi');
                });
            } else if (currentSort === 'Tên từ Z-A') {
                filteredProducts.sort((a, b) => {
                    const titleA = a.querySelector('h3').textContent.trim();
                    const titleB = b.querySelector('h3').textContent.trim();
                    return titleB.localeCompare(titleA, 'vi');
                });
            }
        }

        function updatePagination() {
            const totalPages = Math.ceil(filteredProducts.length / itemsPerPage) || 1;

            allProducts.forEach(p => p.style.display = 'none');

            filteredProducts.forEach((p, index) => {
                if (index >= (currentPage - 1) * itemsPerPage && index < currentPage * itemsPerPage) {
                    p.style.display = 'flex';
                }
            });

            pageLinks.forEach(link => {
                const pageNum = parseInt(link.getAttribute('data-page'));
                if (pageNum <= totalPages) {
                    link.style.display = 'flex';
                    link.classList.toggle('active', pageNum === currentPage);
                } else {
                    link.style.display = 'none';
                }
            });

            prevLink.style.visibility = (currentPage > 1) ? 'visible' : 'hidden';
            nextLink.style.visibility = (currentPage < totalPages) ? 'visible' : 'hidden';

            if (totalPages <= 1) {
                paginationContainer.style.display = 'none';
            } else {
                paginationContainer.style.display = 'flex';
            }
        }

        pageLinks.forEach(link => {
            link.addEventListener('click', function (e) {
                e.preventDefault();
                currentPage = parseInt(this.getAttribute('data-page'));
                updatePagination();
            });
        });

        prevLink.addEventListener('click', function (e) {
            e.preventDefault();
            if (currentPage > 1) {
                currentPage--;
                updatePagination();
            }
        });

        nextLink.addEventListener('click', function (e) {
            e.preventDefault();
            const totalPages = Math.ceil(filteredProducts.length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                updatePagination();
            }
        });

        sortOptionItems.forEach(item => {
            item.addEventListener('click', function () {
                sortOptionItems.forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                currentSort = this.textContent.trim();
                sortSelectedText.textContent = currentSort;

                const activeCategoryBtn = document.querySelector('.category button.active');
                if (activeCategoryBtn) {
                    activeCategoryBtn.click();
                }
            });
        });

        categoryButtons.forEach(btn => {
            const newBtn = btn.cloneNode(true);
            btn.parentNode.replaceChild(newBtn, btn);
            newBtn.addEventListener('click', function () {
                const allCatBtns = document.querySelectorAll('.category button');
                allCatBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');

                const filter = this.getAttribute('data-filter') || 'all';

                filteredProducts = allProducts.filter(p => {
                    if (filter === 'all') return true;

                    const title = p.querySelector('h3').textContent.toLowerCase();
                    const desc = p.querySelector('ul').textContent.toLowerCase();
                    const text = title + ' ' + desc;

                    if (filter === 'heineken') {
                        return title.includes('heineken');
                    }
                    if (filter === 'tiger') {
                        return title.includes('tiger');
                    }
                    if (filter === 'lon') {
                        return (text.includes('lon') || text.includes('nhôm')) && !text.includes('sting') && !text.includes('coca') && !text.includes('strongbow');
                    }
                    if (filter === 'chai') {
                        return text.includes('chai') && !text.includes('sting') && !text.includes('aquafina') && !text.includes('strongbow');
                    }
                    if (filter === 'khac') {
                        return text.includes('strongbow') || text.includes('sting') || text.includes('coca') || text.includes('aquafina') || text.includes('bia việt');
                    }

                    return true;
                });

                applySort();
                currentPage = 1;
                updatePagination();
            });
        });

        updatePagination();
    }

    document.addEventListener("DOMContentLoaded", function () {
        const productList = document.getElementById('product-list');
        const csvUrl = 'http://biacoloa.local/wp-content/uploads/2026/07/dsbia.csv';

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function (results) {
                renderProducts(results.data);
            },
            error: function (error) {
                console.error("Lỗi khi đọc file CSV:", error);
            }
        });

        function renderProducts(products) {
            productList.innerHTML = products.map(p => {
                if (!p['Product-id']) return '';

                return `
                <div class="product">
                    <img src="${p['Images']}" alt="${p['Product-name']}">
                    <h3>${p['Product-name']}</h3>
                    <ul>
                        <li>Thương hiệu: ${p['Brand']}</li>
                        <li>Quy cách: ${p['Specification']}</li>
                        <li>Dung tích: ${p['Capacity']}</li>
                    </ul>
                    <button type="button" onclick="window.open('http://BiaCoLoa.local/test/?id=${p['Product-id']}')">Xem Chi Tiết</button>
                </div>
                `;
            }).join('');

            if (typeof initFilters === 'function') {
                initFilters();
            }
        }
    });
</script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        let isAutoScrolling = false;

        window.addEventListener("wheel", function (e) {
            const categorySection = document.getElementById('danh-muc-san-pham');
            const header = document.querySelector('header');
            
            // Lấy chiều cao thực tế của thanh menu
            const headerHeight = header ? header.offsetHeight : 0;

            // Chỉ kích hoạt khi đang ở trên cùng trang (Y = 0) và cuộn xuống
            if (window.scrollY === 0 && e.deltaY > 0 && !isAutoScrolling) {
                isAutoScrolling = true;

                // Tọa độ tuyệt đối của khu vực danh mục sản phẩm
                const targetPosition = categorySection.offsetTop;
                
                // BIẾN CANH CHỈNH: 
                // Tăng số này lên (ví dụ: 100, 120) nếu nó vẫn cuộn quá sâu.
                // Giảm số này xuống (ví dụ: 30, 50) nếu nó chưa cuộn tới nơi.
                const khoangCachTruHao = 80; 

                // Thực hiện cuộn
                window.scrollTo({
                    top: targetPosition - headerHeight - khoangCachTruHao,
                    behavior: 'smooth'
                });

                // Khóa sự kiện cuộn trong 800ms để hiệu ứng trượt hoàn tất
                setTimeout(() => {
                    isAutoScrolling = false;
                }, 800);
            }
        });
    });
</script>
