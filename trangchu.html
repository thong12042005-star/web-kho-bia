<style>
    /* ==========================================================================
   1. ẨN HOÀN TOÀN HEADER MẶC ĐỊNH & TIÊU ĐỀ TRANG CỦA WORDPRESS
   ========================================================================== */
header.wp-block-template-part,
.wp-block-template-part,
#masthead, 
.site-header,
.top-header-bar,
.wp-block-post-title,
h1.wp-block-post-title,
.entry-title,
.page-title {
    display: none !important;
    height: 0 !important;
    padding: 0 !important;
    margin: 0 !important;
    overflow: hidden !important;
    opacity: 0 !important;
    visibility: hidden !important;
}

/* ==========================================================================
   2. RESET TOÀN BỘ KHOẢNG TRỐNG TRÊN CÙNG CỦA HỆ THỐNG (LẤP ĐẦY KHOẢNG TRẮNG)
   ========================================================================== */
html, 
body, 
#page, 
.site, 
.wp-site-blocks, 
main,
.site-container, 
.main-container {
    margin-top: 0 !important;
    padding-top: 0 !important;
    top: 0 !important;
    position: relative !important;
}

/* Triệt tiêu padding tự động sinh ra từ cấu trúc Layout Content của WP */
.entry-content, 
.wp-block-post-content,
:root :where(.wp-block-post-content),
:root :where(.entry-content) {
    padding-top: 0 !important;
    margin-top: 0 !important;
}

/* ==========================================================================
   3. CẤU HÌNH ĐÈ HEADER MỚI LÊN ĐẦU TRANG (FIXED)
   ========================================================================== */
header {
    position: fixed !important; /* Đóng băng header đè lên mọi khung trống mặc định */
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    z-index: 99999 !important;
    margin-top: 0 !important;
}

/* Đẩy phần nội dung (Hero banner) xuống một khoảng vừa đủ để không bị header fixed che khuất */
header + section,
main > section:first-of-type,
.wp-block-post-content {
    padding-top: 70px !important; /* Thay đổi số này (ví dụ: 75px, 80px) tùy theo độ cao thực tế menu của bạn */
    margin-top: 0 !important;
}
/* Xóa toàn bộ khoảng trắng WordPress */

body,
html,
.wp-site-blocks,
.wp-block-group,
main,
.site-main,
.wp-block-post-content,
.entry-content {
    margin: 0 !important;
    padding: 0 !important;
}

/* Xóa margin của block đầu tiên */
.wp-block-post-content > *:first-child,
.entry-content > *:first-child {
    margin-top: 0 !important;
}

/* Xóa khoảng trắng do alignfull */
.alignfull {
    margin-top: 0 !important;
}

/* Block layout */
.is-layout-flow > * {
    margin-block-start: 0 !important;
}

<script>
    // Cấu hình Tailwind Đông bộ
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    brandGold: '#dfb34c',
                    brandDark: '#111111',
                }
            }
        }
    };

    // --- Slider Sản Phẩm (Products) ---
function initFilters() {

    const itemsPerPage = 5;
    const allProducts = Array.from(document.querySelectorAll(".product"));
    const filteredProducts = [...allProducts];

const prevBtn = document.getElementById("productPrevBtn");
const nextBtn = document.getElementById("productNextBtn");

    let currentPage = 1;

    function updatePagination() {

        const totalPages = Math.ceil(filteredProducts.length / itemsPerPage);

        // Ẩn tất cả sản phẩm
        allProducts.forEach(p => {
            p.style.display = "none";
        });

        // Hiện sản phẩm của trang hiện tại
        filteredProducts.forEach((p, index) => {
            if (
                index >= (currentPage - 1) * itemsPerPage &&
                index < currentPage * itemsPerPage
            ) {
                p.style.display = "block";
            }
        });

        // Ẩn/hiện nút
        prevBtn.style.visibility = currentPage === 1 ? "hidden" : "visible";
        nextBtn.style.visibility = currentPage === totalPages ? "hidden" : "visible";
    }

    // Nút Trang trước
    prevBtn.addEventListener("click", function (e) {
        e.preventDefault();

        if (currentPage > 1) {
            currentPage--;
            updatePagination();
        }
    });

    // Nút Trang sau
    nextBtn.addEventListener("click", function (e) {
        e.preventDefault();

        const totalPages = Math.ceil(filteredProducts.length / itemsPerPage);

        if (currentPage < totalPages) {
            currentPage++;
            updatePagination();
        }
    });

    updatePagination();
}
document.addEventListener("DOMContentLoaded", function () {
        const productList = document.getElementById('product-list');

        // Đường dẫn tới file CSV
        const csvUrl = 'http://biacoloa.local/wp-content/uploads/2026/07/dsbia.csv';

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function (results) {
                renderProducts(results.data);
            },
            error: function (error) {
                console.error("Lỗi khi đọc file CSV:", error);
            }
        });

        function renderProducts(products) {
            productList.innerHTML = products.map(p => {
                // Bỏ qua nếu dòng đó không có mã ID sản phẩm
                if (!p['Product-id']) return '';

                return `
                <div class="product">
                    <img src="${p['Images']}" alt="${p['Product-name']}">
                    <h3>${p['Product-name']}</h3>
                    <ul>
                        <li>Thương hiệu: ${p['Brand']}</li>
                        <li>Quy cách: ${p['Specification']}</li>
                        <li>Dung tích: ${p['Capacity']}</li>
                    </ul>
                    <button type="button" onclick="window.open('http://BiaCoLoa.local/test/?id=${p['Product-id']}')">Xem Chi Tiết</button>
                </div>
                `;
            }).join('');

            // Sau khi render xong mới chạy lại logic lọc/phân trang
            if (typeof initFilters === 'function') {
                initFilters();
            }
        }
    });
/* ================= HERO SLIDER ================= */
document.addEventListener("DOMContentLoaded", function () {

    const slides = document.querySelectorAll(".hero .slide");

    if (slides.length === 0) return;

    let current = 0;

    setInterval(function () {

        // Ẩn ảnh hiện tại
        slides[current].classList.remove("active");

        // Sang ảnh tiếp theo
        current = (current + 1) % slides.length;

        // Hiện ảnh mới
        slides[current].classList.add("active");

    }, 4000); // đổi ảnh mỗi 4 giây

});
</script>
